<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Registrations</title>
</head>
<body>

    <div class="navbar">
    <a href="/">Home</a>
    <a href="/register">Register</a>
    <a href="/mycourses">Registrations</a>
    <a href="/admin">Admin</a>
</div>

<div class="container">

<h1>All Registrations</h1>

<table border="1">

<tr>
<th>Student</th>
<th>Course</th>
</tr>

{% for reg in registrations %}
<tr>
<td>{{ reg[0] }}</td>
<td>{{ reg[1] }}</td>
</tr>
{% endfor %}

</table>
</div>

<div class="footer">
    Course Registration System - AWS Two-Tier Architecture
</div>
</body>
</html>
