<!DOCTYPE html>
<html>
<head>
    <title>All Registrations</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/register">Register</a>
    <a href="/mycourses">My Courses</a>
    <a href="/admin">Admin</a>
</div>

<div class="container">

<h1>All Registrations</h1>

<table>

<tr>
    <th>Student</th>
    <th>Course</th>
</tr>

{% for reg in registrations %}
<tr>
    <td>{{ reg[0] }}</td>
    <td>{{ reg[1] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
