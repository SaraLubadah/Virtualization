<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin</title>
</head>
<body>

<h1>Admin Panel</h1>

<form action="/add_course" method="POST">

<input
type="text"
name="course_name"
placeholder="Course Name"
required>

<button type="submit">
Add Course
</button>

</form>

<br>

<h2>Courses</h2>

<ul>

{% for course in courses %}
<li>
{{ course[1] }}

<a href="/delete_course/{{ course[0] }}">
Delete
</a>

</li>
{% endfor %}

</ul>

</body>
</html>
