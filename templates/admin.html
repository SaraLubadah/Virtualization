<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin</title>
</head>
<body>

    <div class="navbar">
    <a href="/">Home</a>
    <a href="/register">Register</a>
    <a href="/mycourses">Registrations</a>
    <a href="/admin">Admin</a>
</div>

<div class="container">

<h1>Admin Panel</h1>

<form action="/add_course" method="POST">

<input
type="text"
name="course_name"
placeholder="Course Name"
required>

<button type="submit">
Add Course
</button>

</form>

<br>

<h2>Courses</h2>

<ul>

{% for course in courses %}
<li>
{{ course[1] }}

<a href="/delete_course/{{ course[0] }}">
Delete
</a>

</li>
{% endfor %}

</ul>
</div>

<div class="footer">
    Course Registration System - AWS Two-Tier Architecture
</div>
</body>
</html>
